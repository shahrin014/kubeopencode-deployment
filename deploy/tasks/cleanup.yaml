apiVersion: kubeopencode.io/v1alpha1
kind: Task
metadata:
  name: cleanup-test
spec:
  agentRef:
    name: opencode-agent
  commandRef:
    name: cleanup
  description: "Find and remove outdated files in /workspace. Look for temporary files (*.tmp, *.bak, *.swp), build artifacts (node_modules, dist, __pycache__), and old log files. List files found and ask for confirmation before deleting."