apiVersion: kubeopencode.io/v1alpha1
kind: Task
metadata:
  name: cleanup-test
spec:
  agentRef:
    name: opencode-agent
  description: "Find and remove outdated files in the project. Look for:
- Temporary files (e.g., *.tmp, *.bak, *.swp)
- Build artifacts (e.g., node_modules, dist, build, __pycache__)
- Generated files that are no longer needed
- Old log files

List the files found and ask for confirmation before deleting them."
