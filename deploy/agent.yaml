apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: opencode-agent
spec:
  config:
    $schema: https://opencode.ai/config.json
    model: opencode/big-pickle
    provider:
      opencode:
        options:
          apiKey: "{env:OPENCODE_API_KEY}"
    command:
      cleanup:
        template: "Find and remove outdated files in the project. Look for:\n- Temporary files (e.g., *.tmp, *.bak, *.swp)\n- Build artifacts (e.g., node_modules, dist, build, __pycache__)\n- Generated files that are no longer needed\n- Old log files\n\nList the files found and ask for confirmation before deleting them."
        description: Clean up outdated and temporary files
      rerun-test-deployment:
        template: "Recreate the k3d cluster, rerun setup.sh. DO NOT RUN ANY OTHER MANUAL TASKS OR SETUP. Everything MUST BE HANDLED by setup.sh. Ensure the test tasks completed successfully, ensure the LLM response is correct on each task. Get server IP address, ensure Kubeopencode is reachable at http://<server IP:8080/"
        description: Recreate k3d cluster and rerun test deployment
  credentials:
    - name: opencode
      secretRef:
        name: opencode-credentials
  workspaceDir: /workspace
  serviceAccountName: opencode-agent