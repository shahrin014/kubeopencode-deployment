apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencode-agent
  namespace: kubeopencode-default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /agent
        pathType: Prefix
        backend:
          service:
            name: opencode-agent
            port:
              number: 4096
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeopencode-server
  namespace: kubeopencode-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubeopencode-server
            port:
              number: 2746